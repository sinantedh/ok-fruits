<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OK Fruits Premium</title>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .font-header { font-family: 'Bricolage Grotesque', sans-serif; }
        body, .font-ui { font-family: 'Poppins', sans-serif; }
        .font-num { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* High-fidelity glassmorphism utility stylings */
        .glass-panel {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .glass-card-dark {
            background: rgba(24, 24, 35, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#F4F5FA] via-[#E9ECF8] to-[#F1F3FC] text-gray-900 min-h-screen antialiased">

    <!-- ==========================================
         MAIN LAYOUT CONTAINER
         ========================================== -->
    <div class="max-w-md mx-auto min-h-screen flex flex-col p-5 md:max-w-5xl md:grid md:grid-cols-12 md:gap-6 md:p-8 pb-28">
        
        <!-- HEADER SECTION -->
        <header class="flex justify-between items-center w-full mb-6 md:col-span-12">
            <div>
                <h1 class="text-[36px] font-extrabold tracking-tight text-neutral-900 leading-none font-header">hello ,</h1>
                <h2 class="text-[36px] font-extrabold tracking-tight text-[#5D5FEF] leading-tight font-header">ok fruits</h2>
            </div>
            <div class="flex items-center gap-3">
                <button class="relative h-11 w-11 glass-panel rounded-full flex items-center justify-center text-neutral-800 shadow-xs">
                    <i class="fa-solid fa-bell text-lg"></i>
                    <span class="absolute top-3 right-3 h-2 w-2 bg-indigo-600 rounded-full"></span>
                </button>
                <div class="h-12 w-12 rounded-full overflow-hidden border-2 border-white shadow-md">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&q=80" alt="Profile" class="h-full w-full object-cover">
                </div>
            </div>
        </header>

        <!-- CREATE NEW DATA TRIGGER -->
        <div class="w-full mb-6 md:col-span-12">
            <button onclick="openModal('data-modal')" class="w-full bg-neutral-950 hover:bg-neutral-900 text-white rounded-full py-4 text-center font-semibold text-sm tracking-wider uppercase shadow-md transition-all flex items-center justify-center gap-2 border border-white/10">
                <i class="fa-solid fa-plus text-xs text-[#CCFF00]"></i> Create new data
            </button>
        </div>

        <!-- FILTER NAVIGATION -->
        <div class="w-full mb-6 md:col-span-12">
            <h3 class="text-xs font-extrabold uppercase tracking-widest text-neutral-400 mb-3 font-ui">recent sales</h3>
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                <button onclick="filterSales('all')" id="filter-all" class="px-5 py-2.5 bg-[#CCFF00] text-neutral-950 font-bold rounded-full text-xs uppercase tracking-wider shadow-sm transition-all shrink-0">All</button>
                <button onclick="filterSales('pending')" id="filter-pending" class="px-5 py-2.5 glass-panel text-neutral-700 font-semibold rounded-full text-xs uppercase tracking-wider hover:bg-white/80 transition-all shrink-0">pending</button>
                <button onclick="filterSales('boxes')" id="filter-boxes" class="px-5 py-2.5 glass-panel text-neutral-700 font-semibold rounded-full text-xs uppercase tracking-wider hover:bg-white/80 transition-all shrink-0">no: boxes</button>
                <button onclick="filterSales('quantity')" id="filter-quantity" class="px-5 py-2.5 glass-panel text-neutral-700 font-semibold rounded-full text-xs uppercase tracking-wider hover:bg-white/80 transition-all shrink-0">no: quantity sell</button>
            </div>
        </div>

        <!-- GLASSMORPHISM HERO METRIC CARD -->
        <div class="w-full mb-6 md:col-span-12">
            <div class="w-full rounded-[32px] bg-gradient-to-tr from-[#4F46E5] via-[#6366F1] to-[#818CF8] p-6 relative overflow-hidden shadow-xl shadow-indigo-100 flex flex-col justify-between h-48 border border-white/20">
                <!-- Glowing geometric glass backdrop designs -->
                <div class="absolute -right-10 -top-10 w-44 h-44 rounded-full bg-white/15 blur-xl pointer-events-none"></div>
                <div class="absolute left-1/3 bottom-[-40px] w-32 h-32 rounded-full bg-indigo-300/20 blur-xl pointer-events-none"></div>
                
                <div class="flex justify-between items-start w-full">
                    <div class="text-white text-xs font-extrabold uppercase tracking-widest font-header bg-white/15 px-3 py-1.5 rounded-full backdrop-blur-xs">ALL RECORDS</div>
                    <div class="bg-[#CCFF00] h-9 w-9 rounded-full flex items-center justify-center shadow-md">
                        <i class="fa-solid fa-arrow-up text-black text-sm rotate-45"></i>
                    </div>
                </div>
                
                <div class="flex items-center gap-4 text-white">
                    <div class="text-[10px] uppercase font-black tracking-widest text-indigo-200 border-r pr-3 border-white/20 h-12 flex items-center leading-none">today</div>
                    <div class="space-y-1 text-sm font-medium tracking-wide w-full">
                        <div class="flex justify-between border-b border-white/10 pb-0.5"><span>total sales</span><span id="banner-sales" class="font-bold font-num text-[#CCFF00]">0</span></div>
                        <div class="flex justify-between border-b border-white/10 pb-0.5"><span>total quantity</span><span id="banner-qty" class="font-bold font-num">0 Boxes</span></div>
                        <div class="flex justify-between"><span>total pending</span><span id="banner-pending" class="font-bold font-num text-red-200">₹0</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- METRIC CARDS OVERLAYS -->
        <div class="grid grid-cols-2 gap-4 w-full mb-6 md:col-span-12">
            <!-- Total Pending glass card -->
            <div class="glass-panel rounded-[28px] p-5 flex flex-col justify-between h-36 relative overflow-hidden shadow-xs">
                <div class="flex justify-between items-center w-full">
                    <span class="text-[11px] font-extrabold uppercase tracking-wider text-neutral-500">total pending</span>
                    <div class="bg-amber-500/10 text-amber-600 h-6 w-6 rounded-full flex items-center justify-center text-xs">
                        <i class="fa-solid fa-clock"></i>
                    </div>
                </div>
                <div>
                    <h4 id="stat-pending" class="text-3xl font-black tracking-tight text-neutral-900 font-num">₹0</h4>
                </div>
            </div>

            <!-- Total Earned glass card -->
            <div class="glass-panel rounded-[28px] p-5 flex flex-col justify-between h-36 relative overflow-hidden shadow-xs">
                <div class="flex justify-between items-center w-full">
                    <span class="text-[11px] font-extrabold uppercase tracking-wider text-neutral-500">total earned</span>
                    <div class="bg-emerald-500/10 text-emerald-600 h-6 w-6 rounded-full flex items-center justify-center text-xs">
                        <i class="fa-solid fa-wallet"></i>
                    </div>
                </div>
                <div>
                    <h4 id="stat-earned" class="text-3xl font-black tracking-tight text-neutral-900 font-num">₹0</h4>
                    <span class="text-[9px] font-bold text-neutral-400 tracking-wider">/MONTH</span>
                </div>
            </div>
        </div>

        <!-- LIST VIEWS NAV PANEL -->
        <div class="w-full mb-6 md:col-span-12">
            <h3 class="text-xs font-extrabold uppercase tracking-widest text-neutral-400 mb-3">Overview Statistics</h3>
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                <button onclick="showPanel('panel-records')" id="btn-records" class="px-5 py-3.5 bg-white text-indigo-600 font-bold rounded-2xl text-[10px] tracking-wider uppercase shadow-xs shrink-0 transition-all border border-indigo-200">ALL RECORDS</button>
                <button onclick="showPanel('panel-items')" id="btn-items" class="px-5 py-3.5 glass-panel text-neutral-600 font-bold rounded-2xl text-[10px] tracking-wider uppercase shadow-xs shrink-0 transition-all border border-transparent">ITEMS</button>
                <button onclick="showPanel('panel-boxes')" id="btn-boxes" class="px-5 py-3.5 glass-panel text-neutral-600 font-bold rounded-2xl text-[10px] tracking-wider uppercase shadow-xs shrink-0 transition-all border border-transparent">BOXES & CLIENTS</button>
            </div>
        </div>

        <!-- LIVE STREAM RENDER WINDOW -->
        <div class="w-full md:col-span-12 glass-panel rounded-[32px] p-5 shadow-xs min-h-[220px] mb-4">
            <!-- PANEL 1 -->
            <div id="panel-records" class="panel-view space-y-3">
                <div id="render-invoices" class="space-y-2">
                    <div class="text-center py-8 text-xs font-semibold text-neutral-400 animate-pulse">Syncing sales data engine...</div>
                </div>
            </div>
            <!-- PANEL 2 -->
            <div id="panel-items" class="panel-view hidden space-y-3">
                <div id="render-products" class="space-y-2"></div>
            </div>
            <!-- PANEL 3 -->
            <div id="panel-boxes" class="panel-view hidden space-y-3">
                <div id="render-customers" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <!-- STICKY ACTION DECK FOOTER -->
    <footer class="fixed bottom-0 left-0 right-0 p-4 bg-white/60 backdrop-blur-lg border-t border-white/20 z-40 max-w-md mx-auto md:max-w-5xl rounded-t-[32px] shadow-xl">
        <div class="grid grid-cols-2 gap-4">
            <button onclick="openModal('search-modal')" class="bg-neutral-950 hover:bg-neutral-950 text-white rounded-full p-2 pl-6 pr-2 flex justify-between items-center transition-all h-14 border border-white/10 shadow-md">
                <span class="font-bold text-xs uppercase tracking-widest text-neutral-300">search</span>
                <div class="bg-[#CCFF00] h-10 w-10 rounded-full flex items-center justify-center text-black shadow-inner">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </div>
            </button>
            <button onclick="openModal('calc-modal')" class="bg-neutral-950 hover:bg-neutral-950 text-white rounded-full p-2 pl-6 pr-2 flex justify-between items-center transition-all h-14 border border-white/10 shadow-md">
                <span class="font-bold text-xs uppercase tracking-widest text-neutral-300">Calculator</span>
                <div class="bg-[#CCFF00] h-10 w-10 rounded-full flex items-center justify-center text-black shadow-inner">
                    <i class="fa-solid fa-calculator text-sm"></i>
                </div>
            </button>
        </div>
    </footer>

    <!-- ==========================================
         MODALS SYSTEM LAYER OVERLAYS
         ========================================== -->

    <!-- CALCULATOR: HIGHLY SPACIOUS & ELEGANT (NOT CONGESTED) -->
    <div id="calc-modal" class="fixed inset-0 bg-neutral-950/60 z-50 flex items-end sm:items-center justify-center hidden p-0 sm:p-4 backdrop-blur-md animate-fade-in">
        <div class="bg-[#12131A] w-full max-w-md rounded-t-[42px] sm:rounded-[42px] p-6 space-y-6 shadow-2xl border-t sm:border border-neutral-800 flex flex-col justify-end">
            <div class="flex justify-between items-center text-white px-2">
                <span class="text-xs font-bold uppercase tracking-widest text-neutral-500 font-ui"><i class="fa-solid fa-calculator mr-2 text-[#CCFF00]"></i>Desk Counter</span>
                <button onclick="closeModal('calc-modal')" class="text-neutral-500 hover:text-white p-1 transition-colors"><i class="fa-solid fa-circle-xmark text-2xl"></i></button>
            </div>
            
            <!-- Output Monitor Grid -->
            <div class="w-full bg-[#1A1C26] rounded-3xl p-6 text-right space-y-1 border border-neutral-800">
                <div id="calc-mem-indicator" class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest h-4"></div>
                <div id="calc-expr" class="text-sm text-neutral-500 font-medium tracking-wider min-h-[20px] font-num"></div>
                <div id="calc-screen" class="text-5xl font-black text-white tracking-tight truncate font-num py-1">0</div>
            </div>

            <!-- Highly Spacious, Distributed Operational Layout -->
            <div class="grid grid-cols-4 gap-4 text-white font-num pb-2">
                <!-- Row 1 Command Keys -->
                <button onclick="pressCalc('MC')" class="h-14 bg-neutral-900/80 hover:bg-neutral-800 font-bold text-xs text-neutral-400 rounded-2xl transition-all">MC</button>
                <button onclick="pressCalc('MR')" class="h-14 bg-neutral-900/80 hover:bg-neutral-800 font-bold text-xs text-neutral-400 rounded-2xl transition-all">MR</button>
                <button onclick="pressCalc('M+')" class="h-14 bg-neutral-900/80 hover:bg-neutral-800 font-bold text-xs text-emerald-400 rounded-2xl transition-all">M+</button>
                <button onclick="pressCalc('C')" class="h-14 bg-red-950/40 hover:bg-red-900/50 font-bold text-sm text-red-400 rounded-2xl transition-all">C</button>
                
                <!-- Row 2 Expressions Symbols -->
                <button onclick="pressCalc('(')" class="h-14 bg-[#1A1C26] hover:bg-neutral-800 text-neutral-300 font-bold rounded-2xl text-sm transition-all">(</button>
                <button onclick="pressCalc(')')" class="h-14 bg-[#1A1C26] hover:bg-neutral-800 text-neutral-300 font-bold rounded-2xl text-sm transition-all">)</button>
                <button onclick="pressCalc('%')" class="h-14 bg-[#1A1C26] hover:bg-neutral-800 text-[#CCFF00] font-bold rounded-2xl text-sm transition-all">%</button>
                <button onclick="pressCalc('/')" class="h-14 bg-neutral-800 hover:bg-neutral-700 text-[#CCFF00] font-bold rounded-2xl text-lg transition-all">÷</button>
                
                <!-- Number Pads Matrix Blocks -->
                <button onclick="pressCalc('7')" class="h-14 bg-[#232635] hover:bg-neutral-800 font-semibold rounded-2xl text-xl transition-all">7</button>
                <button onclick="pressCalc('8')" class="h-14 bg-[#232635] hover:bg-neutral-800 font-semibold rounded-2xl text-xl transition-all">8</button>
                <button onclick="pressCalc('9')" class="h-14 bg-[#232635] hover:bg-neutral-800 font-semibold rounded-2xl text-xl transition-all">9</button>
                <button onclick="pressCalc('*')" class="h-14 bg-neutral-800 hover:bg-neutral-700 text-[#CCFF00] font-bold rounded-2xl text-lg transition-all">×</button>
                
                <button onclick="pressCalc('4')" class="h-14 bg-[#232635] hover:bg-neutral-800 font-semibold rounded-2xl text-xl transition-all">4</button>
                <button onclick="pressCalc('5')" class="h-14 bg-[#232635] hover:bg-neutral-800 font-semibold rounded-2xl text-xl transition-all">5</button>
                <button onclick="pressCalc('6')" class="h-14 bg-[#232635] hover:bg-neutral-800 font-semibold rounded-2xl text-xl transition-all">6</button>
                <button onclick="pressCalc('-')" class="h-14 bg-neutral-800 hover:bg-neutral-700 text-[#CCFF00] font-bold rounded-2xl text-xl transition-all">−</button>
                
                <button onclick="pressCalc('1')" class="h-14 bg-[#232635] hover:bg-neutral-800 font-semibold rounded-2xl text-xl transition-all">1</button>
                <button onclick="pressCalc('2')" class="h-14 bg-[#232635] hover:bg-neutral-800 font-semibold rounded-2xl text-xl transition-all">2</button>
                <button onclick="pressCalc('3')" class="h-14 bg-[#232635] hover:bg-neutral-800 font-semibold rounded-2xl text-xl transition-all">3</button>
                <button onclick="pressCalc('+')" class="h-14 bg-neutral-800 hover:bg-neutral-700 text-[#CCFF00] font-bold rounded-2xl text-xl transition-all">+</button>
                
                <button onclick="pressCalc('0')" class="h-14 bg-[#232635] hover:bg-neutral-800 font-semibold rounded-2xl text-xl transition-all">0</button>
                <button onclick="pressCalc('.')" class="h-14 bg-[#232635] hover:bg-neutral-800 font-semibold rounded-2xl text-xl transition-all">.</button>
                <button onclick="pressCalc('DEL')" class="h-14 bg-[#232635] hover:bg-neutral-800 flex items-center justify-center text-neutral-400 rounded-2xl transition-all text-base">⌫</button>
                <button onclick="pressCalc('=')" class="h-14 bg-[#CCFF00] hover:opacity-95 text-neutral-950 font-black rounded-2xl flex items-center justify-center text-2xl transition-all shadow-md shadow-lime-950/20">=</button>
            </div>
        </div>
    </div>

    <!-- OVERLAY 2: RECORDFORM ENTRY MODAL -->
    <div id="data-modal" class="fixed inset-0 bg-neutral-950/60 z-50 flex items-end justify-center hidden p-4 backdrop-blur-xs">
        <div class="bg-white w-full max-w-md rounded-[32px] p-6 space-y-6 max-h-[85vh] overflow-y-auto shadow-2xl">
            <div class="flex justify-between items-center border-b pb-3">
                <h3 class="text-sm font-bold text-neutral-900 uppercase tracking-wider"><i class="fa-solid fa-circle-plus text-[#5D5FEF] mr-2"></i>Insert Ledger Records</h3>
                <button onclick="closeModal('data-modal')" class="text-neutral-400 hover:text-black"><i class="fa-solid fa-circle-xmark text-xl"></i></button>
            </div>
            <div class="grid grid-cols-3 gap-2 p-1 bg-neutral-100 rounded-xl text-[10px] font-bold text-center uppercase tracking-wider">
                <button onclick="toggleSubform('form-inv')" id="btn-sub-inv" class="bg-white text-black py-2 rounded-lg shadow-xs">Invoice</button>
                <button onclick="toggleSubform('form-prod')" id="btn-sub-prod" class="text-gray-500 py-2 rounded-lg">Product</button>
                <button onclick="toggleSubform('form-cust')" id="btn-sub-cust" class="text-gray-500 py-2 rounded-lg">Client</button>
            </div>
            
            <form id="invoice-form" class="subform-box space-y-4">
                <input type="text" id="inv-customer" required placeholder="Name of Purchaser" class="w-full px-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-medium">
                <input type="text" id="inv-product" required placeholder="Fruit Variety Details" class="w-full px-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-medium">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="inv-boxes" required placeholder="Total Boxes" class="w-full px-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-medium font-num">
                    <select id="inv-status" class="w-full px-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-bold text-neutral-700">
                        <option value="earned">Earned / Paid</option>
                        <option value="pending" selected>Pending / Balance</option>
                    </select>
                </div>
                <input type="number" id="inv-amount" required placeholder="Settlement Value (₹)" step="0.01" class="w-full px-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-medium font-num">
                <button type="submit" class="w-full bg-neutral-950 text-white py-4 rounded-full font-bold text-xs uppercase tracking-widest">Save Invoice Entry</button>
            </form>
            
            <form id="product-form" class="subform-box hidden space-y-4">
                <input type="text" id="prod-name" required placeholder="Fruit Name" class="w-full px-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-medium">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="prod-stock" required placeholder="Available Stock (KG)" class="w-full px-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-medium font-num">
                    <input type="number" id="prod-price" required placeholder="Wholesale Price per KG" step="0.01" class="w-full px-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-medium font-num">
                </div>
                <button type="submit" class="w-full bg-neutral-950 text-white py-4 rounded-full font-bold text-xs uppercase tracking-widest">Add Stock Asset</button>
            </form>
            
            <form id="customer-form" class="subform-box hidden space-y-4">
                <input type="text" id="cust-name" required placeholder="Trader Profile Name" class="w-full px-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-medium">
                <input type="tel" id="cust-phone" required placeholder="Contact Mobile Number" class="w-full px-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-medium font-num">
                <input type="text" id="cust-city" required placeholder="Hub Location City" class="w-full px-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-medium">
                <button type="submit" class="w-full bg-neutral-950 text-white py-4 rounded-full font-bold text-xs uppercase tracking-widest">Save Client Profile</button>
            </form>
        </div>
    </div>

    <!-- OVERLAY 3: INSTANT SEARCH -->
    <div id="search-modal" class="fixed inset-0 bg-neutral-950/60 z-50 flex items-start justify-center hidden p-4 backdrop-blur-xs">
        <div class="bg-white w-full max-w-md rounded-[32px] p-6 mt-12 space-y-4 shadow-2xl">
            <div class="flex justify-between items-center"><h3 class="text-xs font-bold uppercase tracking-wider text-neutral-900">Search Invoices</h3><button onclick="closeModal('search-modal')" class="text-neutral-400"><i class="fa-solid fa-circle-xmark text-lg"></i></button></div>
            <div class="relative"><input type="text" id="search-input" onkeyup="executeSearch()" placeholder="Type customer name..." class="w-full pl-10 pr-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-medium"><i class="fa-solid fa-magnifying-glass absolute left-3.5 top-4 text-neutral-400 text-sm"></i></div>
            <div id="search-results" class="space-y-2 max-h-60 overflow-y-auto divide-y text-xs font-medium"></div>
        </div>
    </div>

    <!-- FIREBASE SERVICES PLATFORM MODULES -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCspHtx90U4tS6oxercAfHGn2tEAJM0x-o",
            authDomain: "ok-fruits.firebaseapp.com",
            projectId: "ok-fruits",
            storageBucket: "ok-fruits.firebasestorage.app",
            messagingSenderId: "6853965407",
            appId: "1:6853965407:web:2314c38481710d55020dea"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let localizedInvoices = [];
        let performanceSalesFilter = "all";
        let localCalculatorMemory = 0;

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }
        
        function toggleSubform(formId) {
            document.querySelectorAll('.subform-box').forEach(el => el.classList.add('hidden'));
            document.getElementById(formId).classList.remove('hidden');
            const btnMap = {'form-inv': 'btn-sub-inv', 'form-prod': 'btn-sub-prod', 'form-cust': 'btn-sub-cust'};
            document.querySelectorAll('[id^="btn-sub-"]').forEach(el => { el.classList.remove('bg-white', 'text-black', 'shadow-xs'); el.classList.add('text-gray-500'); });
            document.getElementById(btnMap[formId]).classList.add('bg-white', 'text-black', 'shadow-xs');
        }

        function showPanel(panelId) {
            document.querySelectorAll('.panel-view').forEach(el => el.classList.add('hidden'));
            document.getElementById(panelId).classList.remove('hidden');
            const btnMap = {'panel-records': 'btn-records', 'panel-items': 'btn-items', 'panel-boxes': 'btn-boxes'};
            document.querySelectorAll('[id^="btn-"]').forEach(el => { el.classList.remove('bg-white', 'text-indigo-600', 'border-indigo-200'); el.classList.add('text-neutral-600', 'border-transparent'); });
            document.getElementById(btnMap[panelId]).classList.remove('text-neutral-600', 'border-transparent'); document.getElementById(btnMap[panelId]).classList.add('bg-white', 'text-indigo-600', 'border-indigo-200');
        }

        db.collection("invoices").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            localizedInvoices = [];
            let totalPending = 0; let totalEarned = 0; let totalBoxesCount = 0;
            
            snapshot.forEach((doc) => {
                const data = doc.data(); data.id = doc.id; localizedInvoices.push(data);
                const amt = parseFloat(data.amount || 0);
                totalBoxesCount += parseInt(data.boxes || 0);
                if (data.status === "pending") totalPending += amt; else totalEarned += amt;
            });

            document.getElementById("banner-sales").innerText = snapshot.size;
            document.getElementById("banner-qty").innerText = totalBoxesCount + " Boxes";
            document.getElementById("banner-pending").innerText = "₹" + totalPending.toLocaleString('en-IN');

            document.getElementById("stat-pending").innerText = "₹" + totalPending.toLocaleString('en-IN');
            document.getElementById("stat-earned").innerText = "₹" + totalEarned.toLocaleString('en-IN');
            renderFilteredSales();
        });

        function filterSales(type) {
            performanceSalesFilter = type;
            document.querySelectorAll('[id^="filter-"]').forEach(el => { el.classList.remove('bg-[#CCFF00]', 'text-black', 'font-bold'); el.classList.add('glass-panel', 'text-neutral-700', 'font-semibold'); });
            document.getElementById('filter-' + type).classList.add('bg-[#CCFF00]', 'text-black', 'font-bold');
            document.getElementById('filter-' + type).classList.remove('glass-panel', 'text-neutral-700', 'font-semibold');
            renderFilteredSales();
        }

        function renderFilteredSales() {
            const container = document.getElementById("render-invoices");
            if (localizedInvoices.length === 0) { container.innerHTML = `<div class="text-center py-6 text-xs text-neutral-400">No trading records found.</div>`; return; }
            let html = "";
            localizedInvoices.forEach(data => {
                if (performanceSalesFilter === "pending" && data.status !== "pending") return;
                if (performanceSalesFilter === "boxes" && (!data.boxes || parseInt(data.boxes) === 0)) return;
                if (performanceSalesFilter === "quantity" && data.boxes > 0 && data.status === "earned") return; 

                const badgeColor = data.status === "pending" ? "bg-amber-500/10 text-amber-600" : "bg-emerald-500/10 text-emerald-600";
                html += `
                    <div class="flex justify-between items-center bg-white/50 rounded-2xl p-4 border border-white/40 shadow-2xs">
                        <div>
                            <div class="flex items-center gap-2"><span class="font-bold text-sm text-neutral-900 tracking-tight">${data.customer}</span><span class="text-[9px] px-2 py-0.5 rounded-full font-extrabold uppercase tracking-wider ${badgeColor}">${data.status}</span></div>
                            <p class="text-xs font-medium text-neutral-400">${data.product} • <span class="font-bold text-neutral-600">${data.boxes || 0} Boxes</span></p>
                        </div>
                        <span class="text-base font-bold text-neutral-900 font-num">₹${parseFloat(data.amount).toLocaleString('en-IN', {minimumFractionDigits:2})}</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        db.collection("products").onSnapshot((snapshot) => {
            let html = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                html += `
                    <div class="flex justify-between items-center bg-white/50 rounded-2xl p-4 border border-white/40 shadow-2xs">
                        <div><span class="font-bold text-sm text-neutral-900 block tracking-tight">${data.name}</span><span class="text-xs font-medium text-neutral-400">Inventory Stock</span></div>
                        <div class="text-right"><span class="px-2.5 py-1 bg-indigo-500/10 text-indigo-600 text-[10px] font-bold rounded-lg block mb-1 font-num">${data.stock} KG Left</span><span class="text-xs font-bold text-neutral-600 font-num">₹${data.price}/KG</span></div>
                    </div>
                `;
            });
            document.getElementById("render-products").innerHTML = html || `<div class="text-center py-6 text-xs text-neutral-400">No products recorded.</div>`;
        });

        db.collection("customers").onSnapshot((snapshot) => {
            let html = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                html += `
                    <div class="flex justify-between items-center bg-white/50 rounded-2xl p-4 border border-white/40 shadow-2xs">
                        <div><span class="font-bold text-sm text-neutral-900 block tracking-tight">${data.name}</span><span class="text-xs font-medium text-neutral-400"><i class="fa-solid fa-location-dot mr-1 text-neutral-300"></i>${data.city}</span></div>
                        <a href="tel:${data.phone}" class="h-9 w-9 flex items-center justify-center bg-indigo-50 text-indigo-600 rounded-full"><i class="fa-solid fa-phone text-sm"></i></a>
                    </div>
                `;
            });
            document.getElementById("render-customers").innerHTML = html || `<div class="text-center py-6 text-xs text-neutral-400">No clients profiles.</div>`;
        });

        // Form event listeners
        document.getElementById("invoice-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            try {
                await db.collection("invoices").add({
                    customer: document.getElementById("inv-customer").value,
                    product: document.getElementById("inv-product").value,
                    boxes: parseInt(document.getElementById("inv-boxes").value || 0),
                    status: document.getElementById("inv-status").value,
                    amount: parseFloat(document.getElementById("inv-amount").value),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById("invoice-form").reset(); closeModal('data-modal');
            } catch(e){ alert(e.message); }
        });

        document.getElementById("product-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            try {
                await db.collection("products").add({
                    name: document.getElementById("prod-name").value,
                    stock: parseInt(document.getElementById("prod-stock").value),
                    price: parseFloat(document.getElementById("prod-price").value)
                });
                document.getElementById("product-form").reset(); closeModal('data-modal');
            } catch(e){ alert(e.message); }
        });

        document.getElementById("customer-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            try {
                await db.collection("customers").add({
                    name: document.getElementById("cust-name").value,
                    phone: document.getElementById("cust-phone").value,
                    city: document.getElementById("cust-city").value
                });
                document.getElementById("customer-form").reset(); closeModal('data-modal');
            } catch(e){ alert(e.message); }
        });

        function executeSearch() {
            const val = document.getElementById("search-input").value.toLowerCase();
            const out = document.getElementById("search-results");
            if(!val) { out.innerHTML = ""; return; }
            let html = "";
            localizedInvoices.filter(i => i.customer.toLowerCase().includes(val)).forEach(m => {
                html += `<div class="py-2.5 flex justify-between items-center"><div><p class="font-bold text-neutral-900 text-sm">${m.customer}</p><p class="text-neutral-400 text-xs">${m.product}</p></div><span class="font-bold text-neutral-900 font-num">₹${m.amount}</span></div>`;
            });
            out.innerHTML = html || `<p class="text-center text-neutral-400 py-4">No records found.</p>`;
        }

        // Calculator interpreter engine logic
        let calcExpression = "";
        let calcResetOnNext = false;

        function pressCalc(val) {
            const scr = document.getElementById("calc-screen");
            const expr = document.getElementById("calc-expr");
            const memInd = document.getElementById("calc-mem-indicator");

            if (val === 'C') {
                calcExpression = ""; scr.innerText = "0"; expr.innerText = "";
            } else if (val === 'DEL') {
                calcExpression = calcExpression.slice(0, -1);
                scr.innerText = calcExpression || "0";
            } else if (val === 'M+') {
                try {
                    let currentVal = parseFloat(scr.innerText || 0);
                    localCalculatorMemory += currentVal;
                    memInd.innerText = "M = " + localCalculatorMemory;
                    calcResetOnNext = true;
                } catch { scr.innerText = "Error"; }
            } else if (val === 'MR') {
                calcExpression += localCalculatorMemory.toString();
                scr.innerText = calcExpression;
            } else if (val === 'MC') {
                localCalculatorMemory = 0;
                memInd.innerText = "";
            } else if (val === '=') {
                try {
                    if (!calcExpression) return;
                    let runningExpression = calcExpression.replace(/%/g, '*0.01');
                    let result = eval(runningExpression);
                    scr.innerText = Number(result.toFixed(4)).toString();
                    expr.innerText = calcExpression + " =";
                    calcExpression = result.toString();
                    calcResetOnNext = true;
                } catch { scr.innerText = "Error"; calcExpression = ""; }
            } else {
                if (calcResetOnNext && !isNaN(val)) { calcExpression = ""; calcResetOnNext = false; }
                else { calcResetOnNext = false; }
                calcExpression += val;
                scr.innerText = calcExpression;
            }
        }
    </script>
</body>
</html>
